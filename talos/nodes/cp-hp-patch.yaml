# controlplane-hp-elitedesk file
machine:
  sysctls:
    vm.nr_hugepages: "1024"
  kernel:
    modules:
      - name: nvme_tcp
      - name: vfio_pci
  kubelet:
    extraMounts:
      - destination: /var/lib/longhorn
        type: bind
        source: /var/lib/longhorn
        options:
          - bind
          - rshared
          - rw
  network:
    hostname: k8s-prod-cp-01
    interfaces:
      - interface: eno1
        dhcp: false
        addresses:
          - 10.22.20.20/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.22.20.1
    nameservers:
      - 10.22.20.1
  install:
    disk: /dev/nvme0n1
    # Secure boot img required for this box: https://github.com/siderolabs/talos/discussions/8806
    image: factory.talos.dev/metal-installer-secureboot/613e1592b2da41ae5e265e8789429f22e121aab91cb4deb6bc3c0b6262961245:v1.12.6
cluster:
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
  proxy:
    extraArgs:
      metrics-bind-address: 0.0.0.0:10249
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
