# worker-talos-vm
machine:
  sysctls:
    vm.nr_hugepages: "1024"
  kernel:
    modules:
      - name: nvme_tcp
      - name: vfio_pci
  kubelet:
    extraMounts:
      - destination: /var/lib/longhorn
        type: bind
        source: /var/lib/longhorn
        options:
          - bind
          - rshared
          - rw
  network:
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 10.22.20.23/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.22.20.1
    nameservers:
      - 10.22.20.1
  install:
    disk: /dev/sda
