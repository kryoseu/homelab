apiVersion: v1
kind: Service
metadata:
  name: deluge
  namespace: plex-ns
spec:
  selector:
    app: deluge-vpn
  ports:
    - name: web-ui
      protocol: TCP
      port: 8112
      targetPort: 8112
    - name: daemon
      protocol: TCP
      port: 58846
      targetPort: 58846
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deluge-configs
  namespace: plex-ns
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100M
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deluge-gluetun
  namespace: plex-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deluge-vpn
  template:
    metadata:
      labels:
        app: deluge-vpn
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.2.0.1
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          env:
            - name: DNS_UPSTREAM_RESOLVERS
              value: "cloudflare,google"
            - name: VPN_SERVICE_PROVIDER
              value: "protonvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: SERVER_COUNTRIES
              valueFrom:
                secretKeyRef:
                  name: deluge-gluetun-envs
                  key: SERVER_COUNTRIES
            - name: SERVER_CITIES
              valueFrom:
                secretKeyRef:
                  name: deluge-gluetun-envs
                  key: SERVER_CITIES
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: deluge-gluetun-envs
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_ADDRESSES
              value: "10.2.0.2/32"
          securityContext:
            privileged: true
        - name: deluge
          image: linuxserver/deluge:2.2.0-ls372
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "4000"
            - name: TZ
              value: "Canada/Pacific"
            - name: DELUGE_LOGLEVEL
              value: "error"
          volumeMounts:
            - name: configs
              mountPath: /config
              subPath: config/deluge
            - name: deluge
              mountPath: /media
      volumes:
        - name: deluge
          persistentVolumeClaim:
            claimName: plex-media-pvc
        - name: configs
          persistentVolumeClaim:
            claimName: deluge-configs
