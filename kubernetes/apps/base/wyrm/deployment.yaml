apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyrm-server
  namespace: wyrm
spec:
  selector:
    matchLabels:
      app: wyrm-server
  replicas: 1
  template:
    metadata:
      labels:
        app: wyrm-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: wyrm-server
          image: ghcr.io/kryoseu/wyrm-server:0.2.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3001
          env:
            - name: WYRM_DATABASE_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: wyrm-creds
                  key: WYRM_DATABASE_CONNECTION
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyrm-ui
  namespace: wyrm
spec:
  selector:
    matchLabels:
      app: wyrm-ui
  replicas: 1
  template:
    metadata:
      labels:
        app: wyrm-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: wyrm-ui
          image: ghcr.io/kryoseu/wyrm-ui:0.2.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          ports:
            - containerPort: 3000
          env:
            - name: WYRM_BACKEND_URL
              value: "http://wyrm-server:3001"
      volumes:
        - name: nginx-conf
          emptyDir: {}
