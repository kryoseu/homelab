apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex-server
  labels:
    app: plex-server
  namespace: plex-ns
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex-server
  template:
    metadata:
      labels:
        app: plex-server
    spec:
      # hostNetwork: true
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: plex-media-pvc
        - name: configs
          persistentVolumeClaim:
            claimName: plex-configs
        - name: transcode
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi
      containers:
        - name: plex-server
          image: plexinc/pms-docker:1.43.1.10611-1e34174b1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 32400
          livenessProbe:
            tcpSocket:
              port: 32400
            initialDelaySeconds: 60
            periodSeconds: 5
          volumeMounts:
            - mountPath: /config
              name: configs
              subPath: config
            - mountPath: /media/movies
              name: media
              subPath: movies
            - mountPath: /media/shows
              name: media
              subPath: shows
            - mountPath: /transcode
              name: transcode
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {}
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "4000"
            - name: VERSION
              value: "docker"
            - name: UMASK_SET
              value: "022"
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: plex-claim-token
                  key: PLEX_CLAIM
            - name: TZ
              value: "Canada/Pacific"
