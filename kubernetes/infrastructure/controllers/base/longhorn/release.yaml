apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-release
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
      version: 1.11.0
  interval: 1m0s

  values:
    image:
      longhorn:
        manager:
          tag: v1.11.0-hotfix-1
        instanceManager:
          tag: v1.11.0-hotfix-1

    preUpgradeChecker:
      upgradeVersionCheck: false

    upgradeCheck:
      enabled: false
