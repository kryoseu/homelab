apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  chart:
    spec:
      chart: metallb
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: metallb
  values:
  speaker:
    ignoreExcludeLB: true # required for running control plane nodes as workers
    frr:
      enabled: true
    frrk8s:
      enabled: false
  prometheus:
    serviceMonitor:
      enabled: true
  frrk8s:
    prometheus:
      serviceMonitor:
        enabled: false
