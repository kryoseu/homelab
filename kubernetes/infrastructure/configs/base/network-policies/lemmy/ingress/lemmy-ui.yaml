apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-lemmy-ui
  namespace: lemmy
spec:
  podSelector:
    matchLabels:
      app: lemmy-ui
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 1234
