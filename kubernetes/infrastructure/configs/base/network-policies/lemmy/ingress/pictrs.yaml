apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-pictrs
  namespace: lemmy
spec:
  podSelector:
    matchLabels:
      app: pictrs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: lemmy
      ports:
        - protocol: TCP
          port: 8080
