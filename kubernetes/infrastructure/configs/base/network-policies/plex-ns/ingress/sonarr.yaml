apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-sonarr
  namespace: plex-ns
spec:
  podSelector:
    matchLabels:
      app: sonarr
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8989

    - from:
        - podSelector:
            matchLabels:
              app: prowlarr
      ports:
        - protocol: TCP
          port: 8989
